[model]
in_channels = 20
keep_channels = False
input_size = (240, 121)
output_padding = (0, 1)
patch_size = (16, 8)
num_patches = int((self.input_size[0] / self.patch_size[0])) * int((self.input_size[1] / self.patch_size[1]))
embed_dim = 48
patch_dropout = 0.1
vae_latent_dim = 128
sp_enc_latent_dims = (1024, 256)
sp_dec_latent_dims = (256, 1024, self.num_patches * self.in_channels)
sp_mlp_dims = (64, 64)
sp_n_heads = (4, 2)
sp_n_trnfr_layers = (4, 4)
sp_dropouts = (0.1, 0.1)

[training]
epochs = 50
batch_size = 8
num_workers = 32
learning_rate = 0.001
learning_rate_min = 0.00001
save_every = 5

[logging]
level = INFO

